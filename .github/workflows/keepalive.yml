name: Keep Streamlit Apps Alive

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Wake apps
        run: |
          python - <<'EOF'
          import asyncio
          import sys
          from playwright.async_api import async_playwright

          APPS = [
              ("Attendance",  "https://welcome2nwst.streamlit.app/?page=nwst"),
              ("Flush",       "https://update-names.streamlit.app/"),
              ("NWST Health", "https://nwst-health.streamlit.app/?page=cg"),
              ("Chatbot",     "https://nwst-chatbot.streamlit.app/"),
          ]

          # Possible wake-button texts across Streamlit versions
          WAKE_TEXTS = [
              "Yes, get this app back up!",
              "get this app back up",
              "Wake up",
              "Yes, wake it up",
          ]

          async def wake(name: str, url: str, browser) -> bool:
              page = await browser.new_page()
              try:
                  print(f"[{name}] Visiting {url}")
                  await page.goto(url, timeout=60_000, wait_until="domcontentloaded")

                  # Try each known wake-button text
                  clicked = False
                  for text in WAKE_TEXTS:
                      try:
                          btn = page.get_by_text(text, exact=False).first
                          await btn.wait_for(state="visible", timeout=3_000)
                          await btn.click()
                          clicked = True
                          print(f"[{name}] Clicked wake button ({text!r})")
                          break
                      except Exception:
                          continue

                  # If we clicked wake, give the server time to boot; otherwise a short pause suffices
                  wait_ms = 45_000 if clicked else 8_000
                  print(f"[{name}] Waiting {wait_ms // 1000}s ...")
                  await page.wait_for_timeout(wait_ms)
                  print(f"[{name}] OK")
                  return True
              except Exception as e:
                  print(f"[{name}] FAILED: {e}")
                  return False
              finally:
                  await page.close()

          async def main():
              failures = []
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  for name, url in APPS:
                      ok = await wake(name, url, browser)
                      if not ok:
                          failures.append(name)
                  await browser.close()

              if failures:
                  print(f"\nFailed apps: {', '.join(failures)}")
                  sys.exit(1)
              print("\nAll apps woken successfully.")

          asyncio.run(main())
          EOF
